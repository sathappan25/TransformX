<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TransformX | Geometric Transformations</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <header class="brand">
          <h1>TransformX</h1>
          <p>Visualize translation, rotation, and scaling in real time.</p>
        </header>

        <section class="panel">
          <h2>Shape Setup</h2>
          <label for="shapeTemplate">New shape</label>
          <div class="row">
            <select id="shapeTemplate">
              <option value="rectangle">Rectangle</option>
              <option value="triangle">Triangle</option>
              <option value="pentagon">Pentagon</option>
            </select>
            <button id="addShapeBtn" class="btn">Add</button>
          </div>

          <div class="row space-top">
            <label for="shapeList">Active shapes</label>
            <button id="deleteShapeBtn" class="btn danger">Delete</button>
          </div>
          <select id="shapeList" size="4"></select>
          <p id="selectedShapeLabel" class="muted">No shape selected.</p>
        </section>

        <section class="panel">
          <h2>Transform Controls</h2>

          <div class="control">
            <label for="txRange">Translate X</label>
            <div class="pair">
              <input id="txRange" type="range" min="-320" max="320" step="1" value="0" />
              <input id="txInput" type="number" min="-320" max="320" step="1" value="0" />
            </div>
          </div>

          <div class="control">
            <label for="tyRange">Translate Y</label>
            <div class="pair">
              <input id="tyRange" type="range" min="-320" max="320" step="1" value="0" />
              <input id="tyInput" type="number" min="-320" max="320" step="1" value="0" />
            </div>
          </div>

          <div class="control">
            <label for="rotRange">Rotation (degrees)</label>
            <div class="pair">
              <input id="rotRange" type="range" min="-180" max="180" step="1" value="0" />
              <input id="rotInput" type="number" min="-180" max="180" step="1" value="0" />
            </div>
          </div>

          <div class="control">
            <label for="sxRange">Scale X</label>
            <div class="pair">
              <input id="sxRange" type="range" min="0.2" max="3" step="0.01" value="1" />
              <input id="sxInput" type="number" min="0.2" max="3" step="0.01" value="1" />
            </div>
          </div>

          <div class="control">
            <label for="syRange">Scale Y</label>
            <div class="pair">
              <input id="syRange" type="range" min="0.2" max="3" step="0.01" value="1" />
              <input id="syInput" type="number" min="0.2" max="3" step="0.01" value="1" />
            </div>
          </div>
        </section>

        <section class="panel">
          <h2>Pivot</h2>
          <label for="pivotMode">Rotation pivot mode</label>
          <select id="pivotMode">
            <option value="center">Shape center</option>
            <option value="custom">Custom pivot</option>
          </select>

          <div class="pair space-top">
            <input id="pivotX" type="number" min="-500" max="500" step="1" value="0" />
            <input id="pivotY" type="number" min="-500" max="500" step="1" value="0" />
          </div>
          <button id="pickPivotBtn" class="btn secondary space-top">Pick Pivot On Canvas</button>
        </section>

        <section class="panel">
          <h2>Animation</h2>
          <label for="animationMode">Animation type</label>
          <select id="animationMode">
            <option value="none">None</option>
            <option value="rotate">Continuous Rotation</option>
            <option value="scale">Scaling Pulse</option>
          </select>

          <div class="control">
            <label for="animSpeedRange">Speed</label>
            <div class="pair">
              <input id="animSpeedRange" type="range" min="0.2" max="5" step="0.1" value="1" />
              <input id="animSpeedInput" type="number" min="0.2" max="5" step="0.1" value="1" />
            </div>
          </div>

          <div class="row">
            <button id="toggleAnimationBtn" class="btn">Start Animation</button>
            <button id="stopAnimationBtn" class="btn secondary">Stop</button>
          </div>
        </section>

        <section class="panel">
          <h2>Display</h2>
          <label class="checkbox">
            <input id="showOriginal" type="checkbox" checked />
            Show original outline
          </label>
          <label class="checkbox">
            <input id="showPseudo3D" type="checkbox" />
            Pseudo 3D preview
          </label>
